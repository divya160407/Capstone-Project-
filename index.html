<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Event Registration</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #e3e7ed, #f5f7fa);
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 350px;
            background: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #2d3748;
        }

         input, select {
             width: 100%;
             height: 42px;             
             padding: 0 12px;          
             margin: 10px 0;
             border-radius: 6px;
             border: 1px solid #d1d5db;
             font-size: 14px;
            background: #f9fafb;
            box-sizing: border-box;  
        }
        

        input:focus, select:focus {
            border-color: #6b7280;
            outline: none;
            background: #ffffff;
        }

        button {
            width: 100%;
            padding: 11px;
            margin-top: 15px;
            background: #4a5568;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }

        button:hover {
            background: #2d3748;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Event Registration</h2>
    <form action="register.php" method="POST">
        
        <input type="text" name="name" placeholder="Full Name" required>
        <input type="email" name="email" placeholder="Email Address" required>

        <select name="event" required>
            <option value="">Select Event</option>
            <option>A</option>
            <option>B</option>
            <option>C</option>
            <option>D</option>
        </select>

        <button type="submit">Register</button>
    </form>
</div>


</body>
</html>
